<div class="container header-inner">
  <a
    class="brand"
    href="#top"
    data-scroll-to="top"
    data-i18n="a11y.goHome"
    data-i18n-attr="aria-label"
    aria-label="Apoio Diário"
  >
    <img class="brand-logo" src="./assets/logo.png" alt="" aria-hidden="true" />
    <span class="brand-name">Apoio Diário</span>
  </a>

  <button
    class="icon-btn nav-toggle"
    type="button"
    data-nav-toggle
    data-i18n="a11y.openMenu"
    data-i18n-attr="aria-label"
    aria-label="Abrir menu"
    aria-expanded="false"
    aria-controls="site-nav"
  >
    <span class="hamburger" aria-hidden="true"></span>
  </button>

  <nav id="site-nav" class="nav" data-nav>
    <a
      class="nav-link"
      href="#problem"
      data-scroll-to="problem"
      data-i18n="nav.problem"
      >Problema</a
    >
    <a
      class="nav-link"
      href="#solution"
      data-scroll-to="solution"
      data-i18n="nav.solution"
      >Solução</a
    >
    <a
      class="nav-link"
      href="#features"
      data-scroll-to="features"
      data-i18n="nav.features"
      >Recursos</a
    >
    <a class="nav-link" href="#how" data-scroll-to="how" data-i18n="nav.how"
      >Como funciona</a
    >
    <a
      class="nav-link"
      href="#preview"
      data-scroll-to="preview"
      data-i18n="nav.preview"
      >Preview</a
    >
    <a
      class="nav-link"
      href="#validation"
      data-scroll-to="validation"
      data-i18n="nav.validation"
      >Validação</a
    >
    <a
      class="nav-link"
      href="#contact"
      data-scroll-to="contact"
      data-i18n="nav.contact"
      >Contato</a
    >

    <div class="nav-divider" aria-hidden="true"></div>

    <div class="lang-switch" role="group" aria-label="Language switcher">
      <button type="button" class="lang-btn" data-lang="pt" aria-pressed="true">
        🇧🇷 <span data-i18n="lang.pt">Português</span>
      </button>
      <button
        type="button"
        class="lang-btn"
        data-lang="en"
        aria-pressed="false"
      >
        🇺🇸 <span data-i18n="lang.en">English</span>
      </button>
    </div>
  </nav>
</div>
