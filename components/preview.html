<section class="section" id="preview">
  <div class="container reveal">
    <header class="section-header">
      <h2 class="section-title" data-i18n="preview.title">Prévia do app</h2>
    </header>

    <div class="phones">
      <figure class="phone">
        <div class="phone-notch" aria-hidden="true"></div>
        <div class="phone-screen">
          <img
            src="../assets/activity-screen.png"
            alt="Rotina do dia"
            class="shot shot-a"
          />
        </div>
        <figcaption class="phone-caption" data-i18n="preview.shots.routine">
          Rotina do dia
        </figcaption>
      </figure>

      <figure class="phone">
        <div class="phone-notch" aria-hidden="true"></div>
        <div class="phone-screen">
          <img
            src="../assets/activty-details.png"
            alt="Atividade com etapas"
            class="shot shot-b"
          />
        </div>
        <figcaption class="phone-caption" data-i18n="preview.shots.activity">
          Atividade com etapas
        </figcaption>
      </figure>

      <figure class="phone">
        <div class="phone-notch" aria-hidden="true"></div>
        <div class="phone-screen">
          <img
            src="../assets/parental-screen.png"
            alt="Configuração (responsáveis)"
            class="shot shot-c"
          />
        </div>
        <figcaption class="phone-caption" data-i18n="preview.shots.parental">
          Configuração (responsáveis)
        </figcaption>
      </figure>
    </div>
  </div>
